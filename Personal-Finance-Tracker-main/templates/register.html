{% extends "auth_base.html" %}
{% block title %}Register — Finance Tracker{% endblock %}
{% block content %}
<section class="auth-card glass-panel">
  <h2 class="auth-card__heading">Create account</h2>
  <p class="auth-card__text">Start tracking your finances in minutes.</p>

  <form class="form-stack" method="post" action="{{ url_for('register') }}" id="registerForm" novalidate>
    <div class="field">
      <label class="field__label" for="username">Username</label>
      <input class="field__input" type="text" id="username" name="username" autocomplete="username" required minlength="3" maxlength="80">
      <p class="field__error" data-error-for="username" hidden></p>
    </div>
    <div class="field">
      <label class="field__label" for="email">Email</label>
      <input class="field__input" type="email" id="email" name="email" autocomplete="email" required>
      <p class="field__error" data-error-for="email" hidden></p>
    </div>
    <div class="field">
      <label class="field__label" for="password">Password</label>
      <input class="field__input" type="password" id="password" name="password" autocomplete="new-password" required minlength="8">
      <p class="field__hint">At least 8 characters.</p>
      <p class="field__error" data-error-for="password" hidden></p>
    </div>
    <div class="field">
      <label class="field__label" for="confirm_password">Confirm password</label>
      <input class="field__input" type="password" id="confirm_password" name="confirm_password" autocomplete="new-password" required>
      <p class="field__error" data-error-for="confirm_password" hidden></p>
    </div>
    <button type="submit" class="btn btn--primary btn--block">Register</button>
  </form>

  <p class="auth-card__footer">
    Already have an account? <a href="{{ url_for('login') }}">Sign in</a>
  </p>
</section>
{% endblock %}
